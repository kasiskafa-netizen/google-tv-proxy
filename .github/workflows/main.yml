name: Proxy Guncelleyici

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# GitHub'ın istediği Node.js 24 zorlamasını buraya ekliyoruz
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Gerekli Paketleri Yukle
        run: pip install requests

      - name: Scraper Kodunu Calistir
        run: python scraper.py

      - name: Guncel Listeyi Depoya Yukle (Commit)
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add proxy_list.txt || true
          git commit -m "Proxy listesi otomatik guncellendi" || true
          git push || true
          
